proxy-providers:
  pvd:
    tpl_param:
    type: http
    interval: 3600
    url: https://example.com/sub1.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  pvd2:
    tpl_param:
    type: http
    interval: 7200
    url: https://example.com/sub2.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
  static:
    type: file
    path: ./proxy-providers/static.yaml
proxy-groups:
  - name: Select
    type: select
    proxies:
      - DIRECT
      - <Auto>
      - <Fallback>
  - name: Auto
    type: url-test
    tpl_param:
      providers:
        - pvd
    url: https://www.gstatic.com/generate_204
    interval: 300
  - name: Fallback
    type: fallback
    tpl_param:
      providers:
        - pvd2
    url: https://www.gstatic.com/generate_204
    interval: 600
  - name: AllInOne
    type: select
    use:
      - <pvd>
      - <pvd2>
    proxies:
      - DIRECT
  - name: Direct
    type: select
    proxies:
      - DIRECT
