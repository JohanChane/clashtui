proxy-providers:
  pvd:
    tpl_param:
    type: http
    interval: 3600
    url: https://example.com/sub1.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
  pvd2:
    tpl_param:
    type: http
    interval: 7200
    url: https://example.com/sub2.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
  static:
    type: file
    path: ./proxy-providers/static.yaml
proxy-groups:
  - name: Select
    type: select
    proxies:
      - DIRECT
      - ${PGG.Auto}
      - ${PGG.Fallback}
  - name: Auto
    type: url-test
    expand_group_with:
      - ${PPG.pvd}
    url: https://www.gstatic.com/generate_204
    interval: 300
  - name: Fallback
    type: fallback
    expand_group_with:
      - ${PPG.pvd2}
    url: https://www.gstatic.com/generate_204
    interval: 600
  - name: AllInOne
    type: select
    use:
      - ${PPG.pvd}
      - ${PPG.pvd2}
    proxies:
      - DIRECT
  - name: Direct
    type: select
    proxies:
      - DIRECT
