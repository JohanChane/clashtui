proxy-providers:
  pvd:
    tpl_param:
    type: http
    interval: 3600
    url: https://example.com/sub1.yaml
proxy-groups:
  - name: Select
    type: select
    proxies:
      - DIRECT
      - <NonExistent>
  - name: Auto
    type: url-test
    tpl_param:
      providers:
        - pvd
    url: https://www.gstatic.com/generate_204
    interval: 300
