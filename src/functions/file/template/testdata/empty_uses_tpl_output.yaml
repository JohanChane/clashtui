proxy-providers:
  pvd0:
    type: http
    interval: 3600
    url: https://example.com/sub1.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    path: proxy-providers/tpl/empty_uses_tpl/pvd0.yaml
  static:
    type: http
    interval: 3600
    url: https://static.example.com/proxy.yaml
    path: ./proxy-providers/static.yaml
proxy-groups:
  - name: Select
    type: select
    proxies:
      - DIRECT
  - name: Auto-pvd0
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    use:
      - pvd0
  - name: Direct
    type: select
    proxies:
      - DIRECT
clashtui:
  proxy_provider_groups:
    pvd:
      pvd0: https://example.com/sub1.yaml
