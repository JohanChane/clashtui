# Clashtui keymap
# Add entries here to override default key bindings.
# Only non-default bindings need to be listed.
# Press ? in the TUI to see current bindings with descriptions.
#
# Key format (crossterm KeyCode):
#   Unit variants: Enter, Esc, Up, Down, Left, Right
#   Char variant:  !Char <char>
#   shift: true for uppercase
#
# Action values:
#   Simple: MoveUp, MoveDown, Select, Switch, Execute, Esc, etc.
#   Nested: Action: Add, Action: Edit, Action: Delete, etc.
#
# Optional desc field for custom help text:
#   ? code: !Char k
#     shift: false
#     ctrl: false
#     alt: false
#     super_: false
#   :
#     action: MoveUp
#     desc: Move cursor up
#
# Core-specific sections (mihomo / sing-box) override common sections.
{}
