# Default keymap for clashtui.
# Only single-key bindings are loaded here. Chords (gg, dd, td, etc.) are built-in.
#
# crossterm KeyCode format:
#   Unit variants: Enter, Esc, Up, Down, Left, Right
#   Char variant:  !Char <char>
#   shift: true for uppercase
#
# Action values:
#   Simple: MoveUp, MoveDown, Select, Switch, Execute, Esc, etc.
#   Nested: Action: Add, Action: Edit, Action: Delete, Action: Preview, etc.
#
# Core-specific overrides (mihomo/sing-box) use the same section structure.
# Core-specific values override the common section.

connections:
  ? code: !Char k
    shift: false
    ctrl: false
    alt: false
    super_: false
  : MoveUp
  ? code: !Char j
    shift: false
    ctrl: false
    alt: false
    super_: false
  : MoveDown
