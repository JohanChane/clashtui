  template:
    - on: "<Left>"
      action: Switch
      desc: Switch pane
    - on: "<Right>"
      action: Switch
      desc: Switch pane
    - on: "h"
      action: Switch
      desc: Switch pane
    - on: "l"
      action: Switch
      desc: Switch pane
    - on: "<Down>"
      action: MoveDown
      desc: Move down
    - on: "<Up>"
      action: MoveUp
      desc: Move up
    - on: "j"
      action: MoveDown
      desc: Move down
    - on: "k"
      action: MoveUp
      desc: Move up
    - on: ["d", "d"]
      action:
        Action: Delete
      desc: Delete template
    - on: "e"
      action:
        Action: Edit
      desc: Edit
    - on: "E"
      action:
        Action: EditProviders
      desc: Edit proxy providers
    - on: "p"
      action:
        Action: Preview
      desc: Preview
    - on: "<Enter>"
      action:
        Action: Generate
      desc: Generate
    - on: "f"
      action:
        Action: FzfFind
      desc: Find template
    - on: ["g", "g"]
      action:
        Action: GoTop
      desc: Go to top
    - on: "G"
      action:
        Action: GoEnd
      desc: Go to end
    - on: "/"
      action:
        Action: Search
      desc: Search/Filter

