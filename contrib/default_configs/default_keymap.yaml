    - on: "l"
      action: Switch
      desc: Switch pane
    - on: "<Down>"
      action: MoveDown
      desc: Move down
    - on: "<Up>"
      action: MoveUp
      desc: Move up
    - on: "j"
      action: MoveDown
      desc: Move down
    - on: "k"
      action: MoveUp
      desc: Move up
    - on: "<Enter>"
      action: Select
      desc: Select
    - on: "i"
      action:
        Action: Add
      desc: Import (URL or file)
    - on: ["d", "d"]
      action:
        Action: Delete
      desc: Delete profile
    - on: "e"
      action:
        Action: Edit
      desc: Edit
    - on: "p"
      action:
        Action: Preview
      desc: Preview
    - on: "u"
      action:
        Action: Update
      desc: Update
    - on: "/"
      action:
        Action: Search
      desc: Search/Filter
    - on: "t"
      action:
        Action: Test
      desc: Test
    - on: "c"
      action:
        Action: Check
      desc: Check config
    - on: ["C", "u"]
      action:
        Action: CopyUrl
      desc: Copy URL
    - on: "f"
      action:
        Action: FzfFind
      desc: Find profile
    - on: ["g", "g"]
      action:
        Action: GoTop
      desc: Go to top
    - on: "G"
