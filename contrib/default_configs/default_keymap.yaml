# Default keymap for clashtui (yazi-style list format)
# Uses the new list-based YAML format.
# Single key:    on: "j"
# Chord:         on: ["g", "g"]
# Modifier:      on: "<C-u>", on: "<Enter>", on: "<Up>"
# Shift:         on: "G"  (uppercase = shift)
# Nested action: action:\n  Action: Edit
# Description:   desc: "Optional description"

connections:
  - on: "<Up>"
    action: MoveUp
    desc: Move up
  - on: "<Down>"
    action: MoveDown
    desc: Move down
  - on: "k"
    action: MoveUp
    desc: Move up
  - on: "j"
    action: MoveDown
    desc: Move down
  - on: "G"
    action: GoBottom
    desc: Go to bottom
  - on: ["g", "g"]
    action: GoTop
    desc: Go to top
  - on: ["d", "d"]
    action: Terminate
    desc: Close
  - on: ["a", "c"]
    action: TerminateAll
    desc: Close all
  - on: ["s", "h"]
    action: SortByHost
    desc: Sort by Host
  - on: ["s", "l"]
    action: SortByRule
    desc: Sort by Rule
  - on: ["s", "c"]
    action: SortByChains
    desc: Sort by Chains
  - on: ["s", "n"]
    action: SortByDownload
    desc: Sort by Download
  - on: ["s", "u"]
    action: SortByUpload
    desc: Sort by Upload
  - on: ["s", "d"]
    action: SortByDlSpeed
    desc: Sort by DL Speed
  - on: ["s", "s"]
    action: SortByUlSpeed
    desc: Sort by UL Speed
  - on: ["s", "r"]
    action: SortReset
    desc: Reset sort
  - on: "/"
    action: Search
    desc: Search/Filter
  - on: "p"
    action: TogglePause
    desc: Pause/Resume
  - on: "f"
    action: FzfFind
    desc: Find

file:
  profile:
