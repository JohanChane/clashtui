name: Release

on:
  push:
    tags:
      - 'v*'
    paths:
      - '.github/workflows/release.yml'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: goto-bus-stop/setup-zig@v2

      - name: Cache Target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ci-release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-release-${{ runner.os }}-

      - name: Download Dependencies
        run: cargo fetch

      - name: Build linux amd64
        run: |
          rustup target add x86_64-unknown-linux-gnu
          cargo install cargo-zigbuild
          cargo zigbuild --target x86_64-unknown-linux-gnu.2.17 --release --locked

      - name: Build linux arm64
        run: |
          rustup target add aarch64-unknown-linux-gnu
          cargo install cargo-zigbuild
          cargo zigbuild --target aarch64-unknown-linux-gnu.2.17 --release --locked

      - name: Build Version
        run: ./target/x86_64-unknown-linux-gnu/release/clashtui --version | awk '{print $2}' > version.txt

      - name: Pre Upload
        run: |
          mkdir artifacts
          mv ./target/x86_64-unknown-linux-gnu/release/clashtui    ./artifacts/clashtui-amd64
          mv ./target/aarch64-unknown-linux-gnu/release/clashtui    ./artifacts/clashtui-arm64
          mv version.txt                                            ./artifacts/version.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux_Release
          path: artifacts
          retention-days: 5

  build-macos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: goto-bus-stop/setup-zig@v2

      - name: Cache Target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ci-release-macos-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-release-macos-

      - name: Download Dependencies
        run: cargo fetch

      - name: Build macos x86_64
        run: |
          rustup target add x86_64-apple-darwin
          cargo install cargo-zigbuild
          cargo zigbuild --target x86_64-apple-darwin --release --locked

      - name: Build macos aarch64
        run: |
          rustup target add aarch64-apple-darwin
          cargo zigbuild --target aarch64-apple-darwin --release --locked

      - name: Pre Upload
        run: |
          mkdir artifacts
          mv ./target/x86_64-apple-darwin/release/clashtui    ./artifacts/clashtui-darwin-amd64
          mv ./target/aarch64-apple-darwin/release/clashtui    ./artifacts/clashtui-darwin-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS_Release
          path: artifacts
          retention-days: 5

  release:
    runs-on: ubuntu-latest

    needs: [build-linux, build-macos]

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./artifacts

      - name: Get version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "CLASHTUI_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            echo "CLASHTUI_RELEASE_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          else
            VERSION="$(cat ./artifacts/version.txt)"
            echo "CLASHTUI_VERSION=$VERSION" >> $GITHUB_ENV
            echo "CLASHTUI_RELEASE_VERSION=v${VERSION%%-*}" >> $GITHUB_ENV
          fi

      - name: Archive Release
        run: |
          gzip -c ./artifacts/clashtui-amd64 > clashtui-linux-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-arm64 > clashtui-linux-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-darwin-amd64 > clashtui-darwin-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-darwin-arm64 > clashtui-darwin-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            clashtui-linux-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-linux-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-darwin-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-darwin-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
