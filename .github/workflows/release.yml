name: Release

on:
  push:
    tags:
      - 'v*'
    paths:
      - '.github/workflows/release.yml'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zig-target: x86_64-unknown-linux-gnu.2.17
            artifact-name: Linux_amd64_Release
            binary-name: clashtui-amd64
            cache-suffix: linux-amd64
            extract-version: true

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            zig-target: aarch64-unknown-linux-gnu.2.17
            artifact-name: Linux_arm64_Release
            binary-name: clashtui-arm64
            cache-suffix: linux-arm64
            extract-version: false

          - os: macos-13
            target: x86_64-apple-darwin
            zig-target: ''
            artifact-name: macOS_x86_64_Release
            binary-name: clashtui-darwin-amd64
            cache-suffix: macos-x86_64
            extract-version: false

          - os: macos-14
            target: aarch64-apple-darwin
            zig-target: ''
            artifact-name: macOS_aarch64_Release
            binary-name: clashtui-darwin-arm64
            cache-suffix: macos-aarch64
            extract-version: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: goto-bus-stop/setup-zig@v2
        if: matrix.zig-target != ''

      - name: Cache Target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ci-release-${{ matrix.cache-suffix }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-release-${{ matrix.cache-suffix }}-

      - name: Download Dependencies
        run: cargo fetch

      - name: Build (zig + glibc 2.17)
        if: matrix.zig-target != ''
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild
          cargo zigbuild --target ${{ matrix.zig-target }} --release --locked

      - name: Build (native)
        if: matrix.zig-target == ''
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Build Version
        if: matrix.extract-version
        run: ./target/${{ matrix.target }}/release/clashtui --version | awk '{print $2}' > version.txt

      - name: Pre Upload
        run: |
          mkdir artifacts
          mv ./target/${{ matrix.target }}/release/clashtui    ./artifacts/${{ matrix.binary-name }}
          if [ -f version.txt ]; then mv version.txt ./artifacts/version.txt; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts
          retention-days: 5

  release:
    runs-on: ubuntu-latest

    needs: [build]

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./artifacts

      - name: Get version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "CLASHTUI_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            echo "CLASHTUI_RELEASE_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          else
            VERSION="$(cat ./artifacts/version.txt)"
            echo "CLASHTUI_VERSION=$VERSION" >> $GITHUB_ENV
            echo "CLASHTUI_RELEASE_VERSION=v${VERSION%%-*}" >> $GITHUB_ENV
          fi

      - name: Archive Release
        run: |
          gzip -c ./artifacts/clashtui-amd64 > clashtui-linux-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-arm64 > clashtui-linux-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-darwin-amd64 > clashtui-darwin-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-darwin-arm64 > clashtui-darwin-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            clashtui-linux-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-linux-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-darwin-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-darwin-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
