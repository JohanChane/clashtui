name: Release

on:
  push:
    tags:
      - 'v*'
    paths:
      - '.github/workflows/release.yml'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zig-target: x86_64-unknown-linux-gnu.2.17
            artifact-name: Linux_amd64_Release
            binary-name: clashtui-amd64
            cache-suffix: linux-amd64
            extract-version: true

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            zig-target: aarch64-unknown-linux-gnu.2.17
            artifact-name: Linux_arm64_Release
            binary-name: clashtui-arm64
            cache-suffix: linux-arm64
            extract-version: false

          - os: macos-latest
            target: x86_64-apple-darwin
            zig-target: ''
            artifact-name: macOS_x86_64_Release
            binary-name: clashtui-darwin-amd64
            cache-suffix: macos-x86_64
            extract-version: false

          - os: macos-latest
            target: aarch64-apple-darwin
            zig-target: ''
            artifact-name: macOS_aarch64_Release
            binary-name: clashtui-darwin-arm64
            cache-suffix: macos-aarch64
            extract-version: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            zig-target: ''
            artifact-name: Windows_amd64_Release
            binary-name: clashtui-windows-amd64.exe
            cache-suffix: windows-amd64
            extract-version: false

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            zig-target: ''
            artifact-name: Windows_arm64_Release
            binary-name: clashtui-windows-arm64.exe
            cache-suffix: windows-arm64
            extract-version: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: goto-bus-stop/setup-zig@v2
        if: matrix.zig-target

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ci-${{ matrix.cache-suffix }}-${{ hashFiles('Cargo.lock') }}

      - name: Download Dependencies
        run: cargo fetch

      - name: Run Tests
        run: cargo test --release --locked --all-features

      - name: Build (zig + glibc 2.17)
        if: matrix.zig-target
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild
          cargo zigbuild --target ${{ matrix.zig-target }} --release --locked --all-features

      - name: Build (native)
        if: ${{ !matrix.zig-target }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --locked --target ${{ matrix.target }} --all-features

      - name: Build Version
        if: matrix.extract-version
        run: ./target/${{ matrix.target }}/release/clashtui --version | awk '{print $2}' > version.txt

      - name: Pre Upload
        shell: bash
        run: |
          mkdir -p artifacts
          SRC="./target/${{ matrix.target }}/release/clashtui"
          [ "${{ runner.os }}" = "Windows" ] && SRC="${SRC}.exe"
          mv "$SRC" "./artifacts/${{ matrix.binary-name }}"
          if [ -f version.txt ]; then mv version.txt ./artifacts/version.txt; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts
          retention-days: 5

  release:
    runs-on: ubuntu-latest

    needs: [build]

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./artifacts

      - name: Get version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RELEASE_VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(cat ./artifacts/version.txt)"
            SEMVER="$(echo "$VERSION" | sed 's/-[0-9a-f]\{7,\}\(-dirty\)\?$//')"
            RELEASE_VERSION="v$SEMVER"
          fi
          TAG_VERSION="${RELEASE_VERSION#v}"
          # Verify Cargo.toml base version matches the tag base version
          if [ -f ./artifacts/version.txt ]; then
            BIN_VERSION="$(cat ./artifacts/version.txt)"
            CARGO_VERSION="$(echo "$BIN_VERSION" | sed 's/-[0-9a-f]\{7,\}\(-dirty\)\?$//')"
            TAG_BASE="${TAG_VERSION%%-*}"
            CARGO_BASE="${CARGO_VERSION%%-*}"
            if [ "$CARGO_BASE" != "$TAG_BASE" ]; then
              echo "Error: Cargo.toml base version ($CARGO_BASE) does not match tag base version ($RELEASE_VERSION)"
              echo "Please update Cargo.toml version to $TAG_BASE before releasing."
              exit 1
            fi
          fi
          echo "CLASHTUI_RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          # Detect prerelease: version (without 'v' prefix) contains '-'
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "CLASHTUI_IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "CLASHTUI_IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Generate release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGELOG=$(gh api repos/${{ github.repository }}/contents/CHANGELOG.md?ref=${{ github.sha }} --jq '.content' | base64 -d)
          VERSION="${CLASHTUI_RELEASE_VERSION#v}"
          HEADING=$(echo "$CHANGELOG" | grep "^## \[$VERSION\] " | head -1)
          if [ -z "$HEADING" ]; then
            echo "Please see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md)" > release.txt
          else
            HEADING_TEXT="${HEADING#\#\# }"
            ANCHOR=$(echo "$HEADING_TEXT" | tr '[:upper:]' '[:lower:]' | tr -d '[].,;:!?()/' | tr ' ' '-')
            echo "Please see [CHANGELOG-${CLASHTUI_RELEASE_VERSION}](https://github.com/${{ github.repository }}/blob/${CLASHTUI_RELEASE_VERSION}/CHANGELOG.md#${ANCHOR})" > release.txt
          fi

      - name: Archive Release
        run: |
          gzip -c ./artifacts/clashtui-amd64 > clashtui-linux-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-arm64 > clashtui-linux-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-darwin-amd64 > clashtui-darwin-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          gzip -c ./artifacts/clashtui-darwin-arm64 > clashtui-darwin-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
          zip -j clashtui-windows-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.zip ./artifacts/clashtui-windows-amd64.exe
          zip -j clashtui-windows-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.zip ./artifacts/clashtui-windows-arm64.exe

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ env.CLASHTUI_IS_PRERELEASE == 'true' }}
          body_path: release.txt
          files: |
            clashtui-linux-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-linux-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-darwin-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-darwin-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.gz
            clashtui-windows-amd64-${{ env.CLASHTUI_RELEASE_VERSION }}.zip
            clashtui-windows-arm64-${{ env.CLASHTUI_RELEASE_VERSION }}.zip
