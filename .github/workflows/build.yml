name: Build

on:
  push:
    branches:
      - demotui
    paths:
      - '.github/workflows/build.yml'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zig-target: x86_64-unknown-linux-gnu.2.17
            artifact-name: Linux_amd64_Build
            binary-name: clashtui-amd64-debug
            cache-suffix: linux-amd64
            run-test: true

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            zig-target: aarch64-unknown-linux-gnu.2.17
            artifact-name: Linux_arm64_Build
            binary-name: clashtui-arm64-debug
            cache-suffix: linux-arm64
            run-test: false

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: macOS_x86_64_Build
            binary-name: clashtui-darwin-amd64-debug
            cache-suffix: macos-x86_64
            run-test: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: macOS_aarch64_Build
            binary-name: clashtui-darwin-arm64-debug
            cache-suffix: macos-aarch64
            run-test: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: Windows_amd64_Build
            binary-name: clashtui-windows-amd64-debug.exe
            cache-suffix: windows-amd64
            run-test: false

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact-name: Windows_arm64_Build
            binary-name: clashtui-windows-arm64-debug.exe
            cache-suffix: windows-arm64
            run-test: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: goto-bus-stop/setup-zig@v2
        if: matrix.zig-target

      - name: Cache Target
        uses: actions/cache@v4
        with:
          path: |
            ./target
            ~/.cargo
          key: ci-${{ matrix.cache-suffix }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-${{ matrix.cache-suffix }}-${{ hashFiles('Cargo.lock') }}
            ci-${{ matrix.cache-suffix }}-

      - name: Download Dependencies
        run: cargo fetch

      - name: Run tests
        if: matrix.run-test
        run: cargo test --all

      - name: Build (zig + glibc 2.17)
        if: matrix.zig-target
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild
          cargo zigbuild --target ${{ matrix.zig-target }} --locked

      - name: Build (native)
        if: ${{ !matrix.zig-target }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --locked --target ${{ matrix.target }}

      - name: Pre Upload
        shell: bash
        run: |
          mkdir -p artifacts
          SRC="./target/${{ matrix.target }}/debug/clashtui"
          [ "${{ runner.os }}" = "Windows" ] && SRC="${SRC}.exe"
          mv "$SRC" "./artifacts/${{ matrix.binary-name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts
          retention-days: 5
