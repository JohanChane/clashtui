name: Pull Request

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'

env:
  CARGO_TERM_COLOR: always
  CLASHTUI_VERSION: ${{ github.head_ref }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: Linux_amd64_Build
            binary-name: clashtui-amd64-debug
            cache-suffix: linux-amd64
            run-test: true

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact-name: Linux_arm64_Build
            binary-name: clashtui-arm64-debug
            cache-suffix: linux-arm64
            run-test: false

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: macOS_x86_64_Build
            binary-name: clashtui-darwin-amd64-debug
            cache-suffix: macos-x86_64
            run-test: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: macOS_aarch64_Build
            binary-name: clashtui-darwin-arm64-debug
            cache-suffix: macos-aarch64
            run-test: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: Windows_amd64_Build
            binary-name: clashtui-windows-amd64-debug.exe
            cache-suffix: windows-amd64
            run-test: false

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact-name: Windows_arm64_Build
            binary-name: clashtui-windows-arm64-debug.exe
            cache-suffix: windows-arm64
            run-test: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache Target
        uses: actions/cache@v4
        with:
          path: |
            ./target
            ~/.cargo
          key: ci-pr-${{ matrix.cache-suffix }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-pr-${{ matrix.cache-suffix }}-${{ hashFiles('Cargo.lock') }}
            ci-pr-${{ matrix.cache-suffix }}-

      - name: Download Dependencies
        run: cargo fetch

      - name: Run tests
        if: matrix.run-test
        run: cargo test --all --verbose

      - name: Build
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --verbose --locked --target ${{ matrix.target }}

      - name: Build Version
        if: matrix.run-test
        run: ./target/${{ matrix.target }}/debug/clashtui --version

      - name: Pre Upload
        shell: bash
        run: |
          mkdir -p artifacts
          SRC="./target/${{ matrix.target }}/debug/clashtui"
          [ "${{ runner.os }}" = "Windows" ] && SRC="${SRC}.exe"
          mv "$SRC" "./artifacts/${{ matrix.binary-name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts
          retention-days: 5
